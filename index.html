<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Offline-first interval workout timer — work/rest rounds, sets, presets.">
  <title>Intervals</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="setup" class="screen">
    <header>
      <h1>Intervals</h1>
      <button id="settings-open" type="button" aria-label="Settings">&#9881;&#65039;</button>
    </header>

    <section class="presets card">
      <label class="preset-row">
        <span>Preset</span>
        <select id="preset-select"></select>
      </label>
      <div class="preset-actions">
        <input id="preset-name" type="text" placeholder="Save as…" maxlength="40">
        <button id="preset-save" class="btn-small" type="button">Save</button>
        <button id="preset-delete" class="btn-small btn-danger" type="button">Delete</button>
      </div>
    </section>

    <section class="fields card">
      <div class="field">
        <label for="cfg-countdown">Countdown (s)</label>
        <div class="stepper">
          <button type="button" data-step="-1" aria-label="Decrease countdown">&minus;</button>
          <input id="cfg-countdown" type="number" inputmode="numeric" min="0">
          <button type="button" data-step="1" aria-label="Increase countdown">+</button>
        </div>
      </div>
      <div class="field">
        <label for="cfg-work">Work</label>
        <div class="stepper">
          <button type="button" data-step="-5" aria-label="Decrease work">&minus;</button>
          <input id="cfg-work" type="text" inputmode="numeric" autocomplete="off">
          <button type="button" data-step="5" aria-label="Increase work">+</button>
        </div>
      </div>
      <div class="field">
        <label for="cfg-rest">Rest</label>
        <div class="stepper">
          <button type="button" data-step="-5" aria-label="Decrease rest">&minus;</button>
          <input id="cfg-rest" type="text" inputmode="numeric" autocomplete="off">
          <button type="button" data-step="5" aria-label="Increase rest">+</button>
        </div>
      </div>
      <div class="field">
        <label for="cfg-rounds">Rounds</label>
        <div class="stepper">
          <button type="button" data-step="-1" aria-label="Decrease rounds">&minus;</button>
          <input id="cfg-rounds" type="number" inputmode="numeric" min="1">
          <button type="button" data-step="1" aria-label="Increase rounds">+</button>
        </div>
      </div>
      <div class="field">
        <label for="cfg-sets">Sets</label>
        <div class="stepper">
          <button type="button" data-step="-1" aria-label="Decrease sets">&minus;</button>
          <input id="cfg-sets" type="number" inputmode="numeric" min="1">
          <button type="button" data-step="1" aria-label="Increase sets">+</button>
        </div>
      </div>
      <div class="field">
        <label for="cfg-setRest">Set rest</label>
        <div class="stepper">
          <button type="button" data-step="-5" aria-label="Decrease set rest">&minus;</button>
          <input id="cfg-setRest" type="text" inputmode="numeric" autocomplete="off">
          <button type="button" data-step="5" aria-label="Increase set rest">+</button>
        </div>
      </div>
    </section>

    <section class="toggles card">
      <span class="total">Total <strong id="total-time">0:00</strong></span>
    </section>

    <button id="start" class="btn-primary" type="button">Start</button>
  </div>

  <dialog id="settings">
    <h2>Settings</h2>
    <div class="settings-group">
      <h3>Sound</h3>
      <label class="toggle"><input type="checkbox" id="set-sound"> Sound on</label>
      <label class="setting-row" for="set-volume">
        <span>Volume</span>
        <input id="set-volume" type="range" min="0" max="100" step="5">
        <span id="set-volume-val">70%</span>
      </label>
      <label class="toggle"><input type="checkbox" id="set-ticks"> 3-2-1 countdown ticks</label>
      <button id="set-test" class="btn-small" type="button">Test sound</button>
    </div>
    <div class="settings-group">
      <h3>Display</h3>
      <label class="toggle"><input type="checkbox" id="set-seconds"> Always show times in seconds</label>
    </div>
    <div class="settings-group">
      <h3>Haptics</h3>
      <label class="toggle"><input type="checkbox" id="set-vibration"> Vibration (Android)</label>
    </div>
    <button id="settings-close" class="btn-small" type="button">Close</button>
  </dialog>

  <div id="timer" class="screen hidden">
    <div class="timer-top">
      <span id="t-phase">GET READY</span>
      <button id="t-mute" type="button" aria-label="Mute">&#128266;</button>
    </div>

    <div id="t-time">0</div>

    <div id="t-progress"><div id="t-progress-fill"></div></div>

    <div class="timer-meta">
      <span id="t-round"></span>
      <span id="t-set"></span>
    </div>
    <div id="t-next"></div>

    <div class="timer-controls">
      <button id="t-pause" class="btn-big" type="button">Pause</button>
      <button id="t-restart" class="btn-big" type="button">Restart</button>
      <button id="t-stop" class="btn-big" type="button">Exit</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
